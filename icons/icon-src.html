<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; background: #222; }
  .icon {
    width: 512px; height: 512px;
    background: radial-gradient(circle at 30% 25%, #1b2836, #0b0f14 75%);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .icon.rounded { border-radius: 110px; }
  .icon svg { width: 380px; height: 380px; }
  .icon.maskable svg { width: 300px; height: 300px; }
  .ring {
    position: absolute; border-radius: 50%;
    border: 3px solid rgba(255,90,60,.35);
  }
  .r1 { width: 330px; height: 330px; }
  .r2 { width: 430px; height: 430px; border-color: rgba(255,90,60,.18); }
</style>
</head>
<body>
<div class="icon rounded" id="icon">
  <div class="ring r1"></div>
  <div class="ring r2"></div>
  <svg viewBox="0 0 24 24">
    <path d="M2 13h3l2-7 3 14 3-11 2 6 2-3 1 1h4"
      fill="none" stroke="#ff5a3c" stroke-width="2.4"
      stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</div>
</body>
</html>
